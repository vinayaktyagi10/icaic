version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:80"
    volumes:
      - .:/usr/share/nginx/html
    container_name: icaic-dev
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/pages/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
